name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bff:
    name: BFF (Java 21) — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: ./mvnw test
        working-directory: bff
        run: ./mvnw -B test

  frontend:
    name: Frontend — build (tsc strict + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  mcp:
    name: MCP server — build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: install + build + smoke
        working-directory: mcp
        run: |
          npm ci
          npm run build
          npm run smoke
