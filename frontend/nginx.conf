# Serves the built SPA and proxies API calls to the bff service (compose network name "bff").
server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker: nunca cachear (pra updates do PWA propagarem)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Manifest com o tipo certo
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA fallback: client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + actuator to the BFF
    location /api/ {
        proxy_pass http://bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /actuator/ {
        proxy_pass http://bff:8080;
        proxy_set_header Host $host;
    }
}
